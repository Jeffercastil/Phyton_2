{% extends 'base.html' %}

{% block tittle %} Gestión de cursos {% endblock %}

{% block body %}
<div class="row">
    <div class="col-md-4 offset-md-4">
                 <h2>Edicion de cursos</h2>
        <div class="card">
            <div class="card-body">
                <form action="/editarCurso/" method="POST">{% csrf_token %} 
                    <div class="form-group py-2">
                        <input type="text"   class="form-control" value="{{ curso.codigo }}"  id="txtCodigo" name="txtCodigo"  
                            placeholder="Código del curso" minlength="6" readonly required>
                    </div>
                    <div class="form-group py-2">
                        <input type="text" class="form-control" value="{{ curso.nombre }}" id="txtNombre"  name="txtNombre"
                            placeholder="Nombre del curso" maxlength="58" required>
                    </div>
                    <div class="form-group py-2">
                        <input type="text" class="form-control" value="{{ curso.creditos }}" id="NumCreditos" name="NumCreditos"
                             min="1"  max = "10" value ="1" required>
                    </div>
                    <div class="form-group">
                    <button type="submit" class="btn btn-success btn-block text-whites ">Guardar curso</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    </div>
</div>


{%endblock %}
