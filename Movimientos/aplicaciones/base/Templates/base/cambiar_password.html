{% extends 'base/base.html' %}
{% load static %}

{% block title %}Cambiar Contraseña - Sistema de Movimientos{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width: 450px;">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h1>Cambiar Contraseña</h1>
            <p>Actualiza tu contraseña de acceso</p>
        </div>

        <form method="post" action="{% url 'base:cambiar_password' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="password_actual">
                    <i class="fas fa-lock"></i> Contraseña Actual *
                </label>
                <input type="password" id="password_actual" name="password_actual" class="form-control"
                       required placeholder="Ingresa tu contraseña actual">
            </div>

            <div class="form-group">
                <label for="password_nueva">
                    <i class="fas fa-key"></i> Nueva Contraseña *
                </label>
                <input type="password" id="password_nueva" name="password_nueva" class="form-control"
                       required minlength="6" placeholder="Mínimo 6 caracteres">
                <small class="form-text">La contraseña debe tener al menos 6 caracteres</small>
            </div>

            <div class="form-group">
                <label for="password_confirmar">
                    <i class="fas fa-check-circle"></i> Confirmar Nueva Contraseña *
                </label>
                <input type="password" id="password_confirmar" name="password_confirmar" class="form-control"
                       required placeholder="Repite la nueva contraseña">
            </div>

            <div class="form-actions" style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i> Actualizar Contraseña
                </button>
            </div>

            <div class="auth-footer" style="text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e5e7eb;">
                <a href="{% url 'base:mi_perfil' %}" class="btn btn-secondary" style="text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Volver al Perfil
                </a>
            </div>
        </form>
    </div>
</div>

<style>
.auth-container {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.auth-card {
    background: white;
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
}

.auth-header h1 {
    color: #1e293b;
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
}

.auth-header p {
    color: #6b7280;
    font-size: 0.95rem;
}

.form-text {
    color: #6b7280;
    font-size: 0.8rem;
    margin-top: 0.25rem;
    display: block;
}

@media (max-width: 640px) {
    .auth-card {
        padding: 1.5rem;
    }
}
</style>
{% endblock %}
